<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 940" width="1180" height="940"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
     role="img" aria-labelledby="t d">
  <title id="t">loopeng — act → verify → feed-back loop</title>
  <desc id="d">loopeng drives an agent through a bounded act → verify → feed-back loop defined by loop.yaml: the agent runs, a blast-radius write-set gate checks the change set, a verifier gates on exit 0; on pass the run succeeds, on fail the verifier output is fed back as the next prompt and the loop retries within its limits. Every iteration is appended to a resumable ledger with a live heartbeat for status/resume. Platform layers (skills, worktree isolation, orchestration, watch/schedule triggers, MCP server and adapter plugins) compose on the same core. A held-out feedback dogfood shows the agent running a public verifier while loopeng additionally runs a held-out test outside the agent's reach, so the held-out requirement reaches the agent only through feedback.</desc>

  <defs>
    <style>
      .h    { font-weight:700; fill:#1b2233; }
      .sub  { font-size:11.5px; fill:#5b6576; }
      .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .band { font-size:12.5px; font-weight:700; fill:#8a93a3; letter-spacing:.06em; }
      .note { font-size:11.5px; fill:#69727f; }
      .nodet{ font-size:14.5px; }
      .ar   { fill:none; stroke:#9aa5b4; stroke-width:2.4; }
      .arlbl{ font-size:11px; fill:#7b8595; font-weight:600; }
      .flow { stroke-dasharray:9 7; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9aa5b4"/>
    </marker>
    <marker id="ahF" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e11d48"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.4" flood-color="#1b2233" flood-opacity="0.10"/>
    </filter>
    <!-- invisible route the moving token follows: agent → verify → feedback → agent -->
    <path id="loopPath" fill="none" stroke="none" d="M372,176 H836 C 905,176 905,316 700,316 H508 C 405,316 372,250 372,209 Z"/>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="1168" height="928" rx="18" fill="#ffffff" stroke="#dde3ec" stroke-width="1.5" filter="url(#sh)"/>

  <!-- title -->
  <text x="40" y="52" class="h" font-size="25">loopeng</text>
  <text x="146" y="52" class="mono" font-size="15" fill="#6b7585">act → verify → feed-back · v0.3.3</text>
  <text x="40" y="76" class="sub" font-size="13">An agent-agnostic loop runner: a portable loop.yaml drives any shell-callable agent through a bounded, gated, auditable loop.</text>

  <!-- ===================== CORE LOOP ===================== -->
  <text x="40" y="116" class="band">THE CORE LOOP  ·  one iteration</text>

  <!-- nodes (cy = 176, h = 66) -->
  <!-- spec -->
  <g>
    <rect x="61" y="143" width="158" height="66" rx="11" fill="#eef1fe" stroke="#4f46e5" stroke-width="2"/>
    <text x="140" y="172" text-anchor="middle" class="h nodet">loop.yaml</text>
    <text x="140" y="192" text-anchor="middle" class="sub">objective · agent · verify · limits</text>
  </g>
  <!-- agent -->
  <g>
    <rect x="293" y="143" width="158" height="66" rx="11" fill="#f3eefe" stroke="#7c3aed" stroke-width="2"/>
    <text x="372" y="168" text-anchor="middle" class="h nodet">Agent</text>
    <text x="372" y="186" text-anchor="middle" class="sub mono">shell · claude-code · codex</text>
    <text x="372" y="201" text-anchor="middle" class="sub">render prompt {{feedback}} → run</text>
  </g>
  <!-- gate -->
  <g>
    <rect x="525" y="143" width="158" height="66" rx="11" fill="#fef4e6" stroke="#d97706" stroke-width="2"/>
    <text x="604" y="168" text-anchor="middle" class="h nodet">Blast-radius</text>
    <text x="604" y="186" text-anchor="middle" class="sub">git write-set gate</text>
    <text x="604" y="201" text-anchor="middle" class="sub">runs before verify</text>
  </g>
  <!-- verify -->
  <g>
    <rect x="757" y="143" width="158" height="66" rx="11" fill="#e8f7f0" stroke="#059669" stroke-width="2"/>
    <text x="836" y="172" text-anchor="middle" class="h nodet">Verifier</text>
    <text x="836" y="192" text-anchor="middle" class="sub mono">exit 0 = pass (the gate)</text>
  </g>
  <!-- success -->
  <g>
    <rect x="975" y="149" width="140" height="54" rx="27" fill="#e7f8ec" stroke="#16a34a" stroke-width="2"/>
    <circle cx="1006" cy="176" r="16" fill="none" stroke="#16a34a" stroke-width="2.4" opacity="0.55">
      <animate attributeName="r" values="13;19;13" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0;0.55" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="1006" y="182" text-anchor="middle" class="h" font-size="18" fill="#16a34a">✓</text>
    <text x="1058" y="173" text-anchor="middle" class="h" font-size="14" fill="#15803d">success</text>
    <text x="1058" y="190" text-anchor="middle" class="sub mono">exit 0</text>
  </g>

  <!-- forward arrows (subtle flowing dashes) -->
  <g class="ar flow">
    <line x1="219" y1="176" x2="289" y2="176" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="0;-16" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="451" y1="176" x2="521" y2="176" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="0;-16" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="683" y1="176" x2="753" y2="176" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="0;-16" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="915" y1="176" x2="971" y2="176" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="0;-16" dur="0.9s" repeatCount="indefinite"/></line>
  </g>

  <!-- feedback node -->
  <g>
    <rect x="504" y="272" width="200" height="58" rx="11" fill="#fdeaf0" stroke="#e11d48" stroke-width="2"/>
    <text x="604" y="297" text-anchor="middle" class="h nodet" fill="#be123c">feedback</text>
    <text x="604" y="316" text-anchor="middle" class="sub">verifier output → next prompt’s {{feedback}}</text>
  </g>

  <!-- verify -> feedback (fail) -->
  <path class="ar" d="M836,209 C 836,250 760,272 706,287" marker-end="url(#ah)"/>
  <text x="792" y="250" class="arlbl">fail</text>
  <!-- feedback -> agent (the loop, emphasized + flowing) -->
  <path d="M504,300 C 410,300 372,250 372,212" fill="none" stroke="#e11d48" stroke-width="2.8" stroke-dasharray="10 8" marker-end="url(#ahF)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="0.7s" repeatCount="indefinite"/>
  </path>
  <text x="392" y="250" class="arlbl" fill="#be123c">retry</text>

  <!-- moving token along the act→verify→feedback loop -->
  <circle r="5.5" fill="#4f46e5">
    <animateMotion dur="5.5s" repeatCount="indefinite" rotate="auto" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
      <mpath href="#loopPath"/>
    </animateMotion>
  </circle>

  <!-- bounded-by-limits note -->
  <text x="604" y="356" text-anchor="middle" class="note">no pass within limits → <tspan class="mono" fill="#b45309">blocked</tspan> (3) · <tspan class="mono" fill="#b45309">exhausted</tspan> (4) · <tspan class="mono" fill="#b45309">no_progress</tspan> (8)  ·  a hung step → <tspan class="mono">timeout</tspan> (124)</text>

  <!-- ledger / status (state out) -->
  <text x="1140" y="116" text-anchor="end" class="band">STATE OUT</text>
  <g>
    <rect x="965" y="247" width="172" height="60" rx="11" fill="#eef1f6" stroke="#475569" stroke-width="2"/>
    <text x="1051" y="271" text-anchor="middle" class="h" font-size="13">.loopeng/ledger.jsonl</text>
    <text x="1051" y="289" text-anchor="middle" class="sub">append-only · resumable run state</text>
  </g>
  <path class="ar flow" d="M915,196 C 950,210 950,240 1000,247" marker-end="url(#ah)"><animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/></path>
  <text x="940" y="232" class="arlbl">append</text>
  <text x="966" y="330" class="note"><tspan class="mono">heartbeat.json</tspan> → status</text>
  <text x="966" y="346" class="note"><tspan class="mono">loopeng run --resume</tspan></text>

  <!-- divider -->
  <line x1="40" y1="392" x2="1140" y2="392" stroke="#edf0f5" stroke-width="1.5"/>

  <!-- ===================== PLATFORM LAYERS ===================== -->
  <text x="40" y="428" class="band">PLATFORM LAYERS  ·  compose on the same run_loop core, safe-by-default</text>

  <g>
    <!-- 5 tiles, cy=500, h=86 -->
    <g>
      <rect x="40" y="457" width="210" height="86" rx="12" fill="#fbfdff" stroke="#0891b2" stroke-width="1.8"/>
      <text x="58" y="485" class="h" font-size="14">Skills</text>
      <text x="58" y="507" class="sub">parameterized loop.yaml</text>
      <text x="58" y="523" class="sub">templates</text>
      <text x="58" y="539" class="sub mono" fill="#0e7490">loopeng run --skill</text>
    </g>
    <g>
      <rect x="265" y="457" width="210" height="86" rx="12" fill="#fbfdff" stroke="#0891b2" stroke-width="1.8"/>
      <text x="283" y="485" class="h" font-size="14">Worktree isolation</text>
      <text x="283" y="507" class="sub">throwaway git worktree;</text>
      <text x="283" y="523" class="sub">main tree untouched</text>
      <text x="283" y="539" class="sub mono" fill="#0e7490">loopeng run --isolate</text>
    </g>
    <g>
      <rect x="490" y="457" width="210" height="86" rx="12" fill="#fbfdff" stroke="#0891b2" stroke-width="1.8"/>
      <text x="508" y="485" class="h" font-size="14">Orchestration</text>
      <text x="508" y="507" class="sub">levels run in order;</text>
      <text x="508" y="523" class="sub">stages in a level: concurrent</text>
      <text x="508" y="539" class="sub mono" fill="#0e7490">orchestrate plan.yaml</text>
    </g>
    <g>
      <rect x="715" y="457" width="210" height="86" rx="12" fill="#fbfdff" stroke="#0891b2" stroke-width="1.8"/>
      <text x="733" y="485" class="h" font-size="14">Triggers (daemonless)</text>
      <text x="733" y="507" class="sub">watch → runs on file change</text>
      <text x="733" y="523" class="sub">schedule → cron, dry-run</text>
      <text x="733" y="539" class="sub mono" fill="#0e7490">schedule --apply installs</text>
    </g>
    <g>
      <rect x="940" y="457" width="200" height="86" rx="12" fill="#fbfdff" stroke="#0891b2" stroke-width="1.8"/>
      <text x="958" y="485" class="h" font-size="14">MCP &amp; plugins</text>
      <text x="958" y="507" class="sub">stdio JSON-RPC server;</text>
      <text x="958" y="523" class="sub">custom agent.type</text>
      <text x="958" y="539" class="sub mono" fill="#0e7490">loopeng mcp · --plugin</text>
    </g>
  </g>

  <!-- divider -->
  <line x1="40" y1="575" x2="1140" y2="575" stroke="#edf0f5" stroke-width="1.5"/>

  <!-- ===================== HELD-OUT DOGFOOD ===================== -->
  <text x="40" y="611" class="band" fill="#b45309">REAL-AGENT DOGFOOD  ·  the held-out feedback barrier</text>
  <rect x="40" y="625" width="1100" height="282" rx="14" fill="#fffaf2" stroke="#f3d8b0" stroke-width="1.5"/>

  <text x="64" y="657" class="sub" font-size="12.5">A self-verifying agent runs the suite in its own turn — so to prove feedback is load-bearing, the second requirement is hidden <tspan class="h" fill="#92400e">mechanically</tspan>:</text>

  <!-- agent -->
  <g>
    <rect x="70" y="700" width="190" height="64" rx="11" fill="#f3eefe" stroke="#7c3aed" stroke-width="2"/>
    <text x="165" y="728" text-anchor="middle" class="h" font-size="14">Agent</text>
    <text x="165" y="747" text-anchor="middle" class="sub mono">claude -p · codex exec</text>
  </g>
  <!-- public verifier (agent-visible) -->
  <g>
    <rect x="330" y="668" width="300" height="56" rx="11" fill="#e8f7f0" stroke="#059669" stroke-width="2"/>
    <text x="350" y="691" class="h" font-size="13">Public verifier</text>
    <text x="350" y="711" class="sub">agent runs the public test suite → ✓ passes</text>
  </g>
  <!-- loopeng verify (public + held-out) -->
  <g>
    <rect x="330" y="740" width="300" height="56" rx="11" fill="#eef1f6" stroke="#475569" stroke-width="2"/>
    <text x="350" y="763" class="h" font-size="13">loopeng’s <tspan class="mono" font-weight="400">verify</tspan> step</text>
    <text x="350" y="783" class="sub mono">runs PUBLIC + HELD-OUT test</text>
  </g>
  <!-- held-out fails -->
  <g>
    <rect x="700" y="740" width="280" height="56" rx="11" fill="#fdeaf0" stroke="#e11d48" stroke-width="2"/>
    <text x="720" y="763" class="h" font-size="13" fill="#be123c">HELD-OUT test fails ✗</text>
    <text x="720" y="783" class="sub">outside the agent’s workspace &amp; build</text>
  </g>

  <!-- arrows in dogfood -->
  <line class="ar" x1="260" y1="724" x2="326" y2="700" marker-end="url(#ah)"/>
  <line class="ar" x1="260" y1="740" x2="326" y2="762" marker-end="url(#ah)"/>
  <line class="ar" x1="630" y1="768" x2="696" y2="768" marker-end="url(#ah)"/>
  <!-- feedback back to agent: the only channel -->
  <path d="M840,798 C 840,872 800,888 720,888 H235 C 178,888 165,835 165,768" fill="none" stroke="#e11d48" stroke-width="2.8" stroke-dasharray="10 8" marker-end="url(#ahF)">
    <animate attributeName="stroke-dashoffset" values="0;-18" dur="0.7s" repeatCount="indefinite"/>
  </path>
  <text x="500" y="843" text-anchor="middle" class="h" font-size="12.5" fill="#be123c">{{feedback}} is the only channel that reveals the held-out rule → iteration 2 implements it</text>

  <!-- caveat -->
  <text x="1116" y="700" text-anchor="end" class="note" font-size="11">Verified by a real 2-iteration run +</text>
  <text x="1116" y="716" text-anchor="end" class="note" font-size="11">an independent multi-agent audit.</text>
  <text x="1116" y="744" text-anchor="end" class="note" font-size="11" fill="#b45309">Airtight only as configured —</text>
  <text x="1116" y="760" text-anchor="end" class="note" font-size="11" fill="#b45309">reads are not confined.</text>
</svg>
